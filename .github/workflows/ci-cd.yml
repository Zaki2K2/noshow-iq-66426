# ─────────────────────────────────────────────────────────────
# ci-cd.yml — Full CI/CD pipeline:
#   1. Lint with flake8
#   2. Run pytest
#   3. Build Docker image
#   4. Push image to Docker Hub
#   5. Trigger Hugging Face Space rebuild
#
# Required GitHub Secrets (set in repo Settings → Secrets):
#   DOCKER_HUB_USERNAME   — your Docker Hub username
#   DOCKER_HUB_TOKEN      — Docker Hub access token (not password)
#   HF_TOKEN              — Hugging Face write token
#   HF_SPACE              — e.g. "yourname/noshow-iq"
# ─────────────────────────────────────────────────────────────

name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/noshow-iq

jobs:

  # ─────────────────────────────────────────────────
  # Job 1: Lint + Test
  # ─────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: flake8 noshow_iq/ tests/ smoke_test.py --max-line-length=100

      - name: Run pytest
        run: pytest tests/ -v

  # ─────────────────────────────────────────────────
  # Job 2: Docker build + push  (only on push to main)
  # ─────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test                         # only run if tests pass
    if: github.ref == 'refs/heads/main' # skip for PRs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ─────────────────────────────────────────────────
  # Job 3: Trigger Hugging Face Space rebuild
  # ─────────────────────────────────────────────────
  hf-deploy:
    name: Hugging Face Deployment
    runs-on: ubuntu-latest
    needs: docker                       # only after Docker push succeeds
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger HF Space rebuild
        # This calls the HF API to restart the Space so it pulls the
        # latest Docker image we just pushed.
        run: |
          curl -X POST \
            "https://huggingface.co/api/spaces/${{ secrets.HF_SPACE }}/restart" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}"
